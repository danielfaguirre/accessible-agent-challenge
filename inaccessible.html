<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>pg</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #cccccc;
      color: #aaaaaa;
    }

    .topbar {
      background: #bbbbbb;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .topbar .logo {
      font-size: 22px;
      font-weight: bold;
      color: #c0c0c0;
    }

    .topbar a {
      color: #b8b8b8;
      text-decoration: none;
      font-size: 15px;
    }

    .hero {
      background: #d0d0d0;
      padding: 60px 24px;
      text-align: center;
    }

    .hero img {
      width: 100%;
      max-width: 900px;
      height: 320px;
      object-fit: cover;
      display: block;
      margin: 0 auto 24px;
    }

    .hero h1 {
      font-size: 36px;
      color: #c5c5c5;
      margin-bottom: 12px;
    }

    .hero p {
      font-size: 16px;
      color: #c8c8c8;
      max-width: 600px;
      margin: 0 auto 24px;
    }

    .hero button {
      background: #c2c2c2;
      color: #cbcbcb;
      border: none;
      padding: 12px 28px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
    }

    .section {
      padding: 40px 24px;
    }

    .section-title {
      font-size: 24px;
      color: #b5b5b5;
      margin-bottom: 20px;
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #d8d8d8;
      border-radius: 8px;
      padding: 20px;
      flex: 1 1 220px;
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .card .price {
      font-size: 18px;
      color: #c3c3c3;
      margin-bottom: 8px;
    }

    .card button {
      width: 100%;
      background: #c9c9c9;
      color: #d2d2d2;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }

    .form-section {
      background: #d4d4d4;
      padding: 40px 24px;
      max-width: 520px;
    }

    .form-section .form-title {
      font-size: 22px;
      color: #bebebe;
      margin-bottom: 20px;
    }

    .form-section input,
    .form-section textarea,
    .form-section select {
      display: block;
      width: 100%;
      margin-bottom: 14px;
      padding: 10px;
      background: #cfcfcf;
      border: 1px solid #c5c5c5;
      color: #c0c0c0;
      font-size: 15px;
      border-radius: 4px;
    }

    .form-section textarea {
      height: 100px;
      resize: none;
    }

    .form-section button {
      background: #c6c6c6;
      color: #cecece;
      border: none;
      padding: 12px 24px;
      font-size: 15px;
      cursor: pointer;
      border-radius: 4px;
    }

    .footer {
      background: #c4c4c4;
      padding: 20px 24px;
      font-size: 13px;
      color: #bdbdbd;
      display: flex;
      gap: 24px;
    }

    .footer a {
      color: #bfbfbf;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo">ACME</div>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>

  <div class="hero">
    <img src="https://picsum.photos/seed/hero/900/320">
    <h1>Welcome</h1>
    <p>Discover the best products at the best prices. Shop now and save big on every order.</p>
    <button>Click here</button>
  </div>

  <div class="section">
    <div class="section-title">Featured</div>

    <div class="cards">

      <div class="card">
        <img src="https://picsum.photos/seed/prod1/400/140">
        <div class="price">$29.99</div>
        <button>Click</button>
      </div>

      <div class="card">
        <img src="https://picsum.photos/seed/prod2/400/140">
        <div class="price">$49.00</div>
        <button>Click</button>
      </div>

      <div class="card">
        <img src="https://picsum.photos/seed/prod3/400/140">
        <div class="price">$14.50</div>
        <button>Click</button>
      </div>

    </div>
  </div>

  <div class="form-section">
    <div class="form-title">Get in touch</div>
    <input type="text">
    <input type="email">
    <select>
      <option value="">--</option>
      <option value="s">Sales</option>
      <option value="s">Support</option>
    </select>
    <textarea></textarea>
    <button>Go</button>
  </div>

  <div class="footer">
    <a href="#">Link</a>
    <a href="#">Link</a>
    <a href="#">Link</a>
    <span>© 2026</span>
  </div>

</body>
</html>
